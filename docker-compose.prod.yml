# =============================================================================
# CREDO Finanzportal - Produktions-Konfiguration
# =============================================================================
# Deployment: docker compose -f docker-compose.prod.yml --env-file .env.production up -d
# Voraussetzung: Caddy Reverse Proxy mit externem Netzwerk "reverse_proxy"
# Domain: finanzen.fes-credo.de
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: credo-finanz-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: credo
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: finanzportal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credo -d finanzportal"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: credo-finanz-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://credo:${DB_PASSWORD}@db:5432/finanzportal?schema=public
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-CREDO Finanzportal}
      MAIL_FROM_EMAIL: ${MAIL_FROM_EMAIL}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD}
      APP_URL: ${APP_URL:-https://finanzen.fes-credo.de}
      NODE_ENV: production
    ports:
      - "192.168.12.163:3333:3000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - reverse_proxy
      - internal

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  reverse_proxy:
    external: true
  internal:
    internal: true
